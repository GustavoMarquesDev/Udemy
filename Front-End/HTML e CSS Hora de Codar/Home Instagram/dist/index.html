<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Instagram</title>
    <link rel="shortcut icon" href="/favicon.c3d66290.png">
    <link rel="stylesheet" href="/sass/main.css">
  </head>
  <body>
    <main>
      <div id="main-container">
        <div id="banner-container">
          <img src="/imagem_cel_exterior.3822a24d.png" alt="Crie uma conta no Instagram">
        </div>
        <div id="form-container">
          <div id="form-box">
            <img id="logo-insta" src="/logo_instagram.bde8a2b4.png" alt="Instagram">
            <form id="login-form">
              <input type="text" name="username" placeholder="Telefone, nome de usuário ou email">
              <input type="password" name="password" placeholder="Senha">
              <input type="submit" value="Enviar">
            </form>
            <div class="separator">
              <div class="line"></div>
              <span>Ou</span>
            </div>
            <div id="other-links">
              <div id="facebook-login">
                <a href="#"><img src="/logo_facebook.9feeef1d.svg" alt="Facebook">
                  <span>Entrar com o Facebook</span>
                </a>
              </div>
              <div id="forgot-pass">
                <a href="#">Esqueceu a senha?</a>
              </div>
            </div>
          </div>
          <div id="register-container">
            <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
          </div>
          <div id="get-app-container">
            <p>Obtenha o aplicativo.</p>
            <a href="#">
              <img src="/botao_apple.6d081d96.png" alt="Apple Store">
            </a>
            <a href="#">
              <img src="/botao_google_play.e4df51fd.png" alt="Google Play">
            </a>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <nav>
        <ul id="footer-links">
          <li><a href="#">Sobre</a></li>
          <li><a href="#">Ajuda</a></li>
          <li><a href="#">Imprensa</a></li>
          <li><a href="#">API</a></li>
          <li><a href="#">Carreiras</a></li>
          <li><a href="#">Privacidade</a></li>
          <li><a href="#">Termos</a></li>
          <li><a href="#">Localizações</a></li>
          <li><a href="#">Contas mais relevantes</a></li>
          <li><a href="#">Hashtags</a></li>
          <li><a href="#">Idioma</a></li>
        </ul>
      </nav>
      <p id="copyright">&copy; 2023 Instagram do Facebook</p>
    </footer>
  <script src="/Home%20Instagram.59712999.js"></script></body>
</html>
